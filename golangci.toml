version = "2"

[linters]
disable = ["errcheck", "bodyclose"]

enable = [
	"unconvert",
	"dupl",
	"gocyclo",
	"misspell",
	"lll",
	"unparam",
	"nakedret",
	"prealloc",
	"gocritic",
	"gochecknoinits",
]

[linters.settings.staticcheck]
checks = ["-ST1005"]

[formatters]
disable = [
	"goimports",
	"gofmt",
]

[run]
timeout = "60s"

[issues]
max-same-issues = 0
