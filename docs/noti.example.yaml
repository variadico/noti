# yaml-language-server: $schema=https://raw.githubusercontent.com/variadico/noti/refs/heads/main/docs/noti.schema.json
---
# noti configuration
# See https://github.com/variadico/noti for documentation.

$schema: https://raw.githubusercontent.com/variadico/noti/refs/heads/main/docs/noti.schema.json

banner:
  # Path to notification icon image. On macOS, accepts PNG or JPEG. On Linux,
  # accepts an image path or a freedesktop icon theme name. On Windows,
  # accepts an .ico file path.
  icon: ""

nsuser:
  # Banner success sound. Default is Ping. Possible options are Basso, Blow,
  # Bottle, Frog, Funk, Glass, Hero, Morse, Ping, Pop, Purr, Sosumi,
  # Submarine, Tink. See /System/Library/Sounds for available sounds.
  soundName: Ping
  # Banner failure sound. Default is Basso. Possible options are Basso,
  # Blow, Bottle, Frog, Funk, Glass, Hero, Morse, Ping, Pop, Purr, Sosumi,
  # Submarine, Tink. See /System/Library/Sounds for available sounds.
  soundNameFail: Basso

say:
  # Name of voice used for speech notifications.
  voice: ""

espeak:
  # Name of voice used for speech notifications.
  voiceName: ""

speechsynthesizer:
  # Name of voice used for speech notifications.
  voice: ""

bearychat:
  # BearyChat incoming URI.
  incomingHookURI: ""

keybase:
  # Keybase message destination. Can be either users (comma-separated) or team.
  conversation: ""
  # Keybase team's chat channel to send to. Conversation must be a team.
  # If empty, the team's default channel will be used (typically "general").
  channel: ""
  # Keybase self-destructing message, after the specified time. Times are
  # written like 30s (30 seconds), 15m (15 minutes), 24h (24 hours).
  explodingLifetime: ""
  # Enables broadcasting a message to everyone (when conversation is
  # your username), or to teams (when conversation is your team name).
  public: false

pushbullet:
  # Pushbullet access token. Log into your Pushbullet account and retrieve a
  # token from the Account Settings page.
  accessToken: ""
  # Pushbullet device iden of the target device, if sending to a single device.
  deviceIden: ""

pushover:
  # Pushover access token. Log into your Pushover account and create a
  # token from the Create New Application/Plugin page.
  apiToken: ""
  # Pushover message destination. Should be your User Key.
  userKey: ""

pushsafer:
  # Pushsafer private or alias key. Log into your Pushsafer account and note
  # your private or alias key.
  key: ""

simplepush:
  # Simplepush key. Install the Simplepush app and retrieve your key there.
  key: ""
  # Customise ringtone and vibration.
  event: ""

slack:
  # Slack access token. Log into your Slack account and retrieve a token
  # from the Slack Web API page.
  token: ""
  # Slack message destination. Can be either a #channel or a @username.
  channel: ""
  # Noti bot username.
  username: ""

telegram:
  # Telegram access token. The token can be retrieved using the BotFather
  # (https://telegram.me/botfather).
  token: ""
  # Telegram message destination. Can be either a chat or a channel.
  chatId: ""
  # Telegram thread ID. If defined, the message will be posted in the thread;
  # if omitted, the default thread will be used.
  topic: ""

twilio:
  # Twilio access token. Log into your Twilio account and copy the auth token
  # from your project dashboard.
  authtoken: ""
  # Twilio account ID. Log into your Twilio account and copy the account SID
  # from your project dashboard.
  accountsid: ""
  # Destination phone number for your SMS message.
  # Format this number with a '+' and a country code, e.g., +16175551212.
  numberto: ""
  # The Twilio phone number, short code, or Messaging Service that sends
  # this message. Must be a Twilio phone number that you own,
  # formatted with a '+' and country code, e.g. +16175551212 (E.164 format).
  numberfrom: ""

gchat:
  # Google Chat Webhook URL.
  appurl: ""
  # Golang template used for producing the message text. It can include
  # the title and message.
  template: ""

chanify:
  # Chanify sender webhook URL. Create one from the app.
  channelURL: ""
  # Turns on and off the sound (not in silent mode) when a notification
  # is received.
  sound: false
  # Priority number from 1 to 10 used by iOS to order and display
  # relevant notifications.
  priority: 10
  # How the notification appears (whether to show in DnD or not).
  # Use active, passive, or time-sensitive.
  interruptionLevel: active

ntfy:
  # ntfy server URL. Defaults to https://ntfy.sh/.
  url: "https://ntfy.sh/"
  # Topic ID to send messages to.
  topic: ""
  # Bearer access token for authentication on private topics.
  # See https://docs.ntfy.sh/publish/#access-tokens.
  token: ""

bark:
  # Bark server URL. Defaults to https://api.day.app/push.
  apiurl: "https://api.day.app/push"
  # Device key to send messages to.
  key: ""
